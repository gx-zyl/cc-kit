# w-ocean 配置
# 每次 grow-dream 执行后在此目录生成知识图谱
# 修改此文件可自定义节点/边类型和行为

# ─── 节点类型 ───
nodeTypes:
  - id: skill
    label: Skill
    description: 场景化的解题套路，有判断分支
    icon: 🎯
  - id: rule
    label: Rule
    description: 跨项目的通用行为约束
    icon: 📏
  - id: command
    label: Command
    description: 确定性操作序列
    icon: ⚡
  - id: agent
    label: Agent
    description: 持续运行的有限角色
    icon: 🤖
  - id: hook
    label: Hook
    description: git/claude 事件触发的自动化
    icon: 🔗
  - id: memory
    label: Memory
    description: 跨会话持久化记忆
    icon: 🧠
  - id: doc
    label: Doc
    description: 项目文档
    icon: 📄
  - id: concept
    label: Concept
    description: 领域概念或术语
    icon: 💡
  - id: decision
    label: Decision
    description: 架构决策记录
    icon: 🏛️

# ─── 边类型 ───
edgeTypes:
  - id: extends
    label: 扩展
    description: A 扩展/增强 B
    arrow: "─extends→"
  - id: depends-on
    label: 依赖
    description: A 依赖 B
    arrow: "─depends→"
  - id: conflicts-with
    label: 冲突
    description: A 与 B 冲突/替代
    arrow: "─conflicts→"
  - id: generalizes
    label: 泛化
    description: A 是 B 的通用化版本
    arrow: "─generalizes→"
  - id: relates-to
    label: 关联
    description: A 与 B 有通用关联
    arrow: "─relates→"
  - id: precedes
    label: 前置
    description: A 在 B 之前
    arrow: "─precedes→"
  - id: triggers
    label: 触发
    description: A 的执行会触发 B
    arrow: "─triggers→"
  - id: refines
    label: 细化
    description: A 细化了 B 的规则
    arrow: "─refines→"
  - id: alternative
    label: 替代方案
    description: A 是 B 的替代方案
    arrow: "─alternative→"

# ─── 自动去重 ───
dedup:
  # 节点: 按 id 去重，同 id 更新内容保留创建时间
  nodeById: true
  # 边: 按 (from, to, type) 去重
  edgeByTriple: true
  # 自动从节点的 refs 字段创建 relates-to 边
  autoEdgesFromRefs: true

# ─── 排除模式（不纳入图谱的文件/目录） ───
exclude:
  - node_modules/
  - .git/
  - __pycache__/
  - .venv/
  - dist/
  - build/

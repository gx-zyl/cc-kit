# yaml-language-server: $schema=./workflow-schema.json
name: triage
description: 快速排查问题——多角度并行分析，综合定位根因
args:
  errorMessage: string    # 声明输入参数

phases:
  - title: 多角度分析
  - title: 综合结论

steps:

  # ============================================================
  # 3 个独立视角同时分析，互不干扰
  # ============================================================
  - id: parallel-analysis
    phase: 多角度分析
    parallel:
      - id: root-cause
        label: 根因分析
        agent:
          prompt: |
            从因果链角度分析这个错误：
            {{args.errorMessage}}

            列出所有可能的直接原因（至少 3 个），
            评估每个原因的可能性（高/中/低），确定最可能的根因。
          schema:
            type: object
            properties:
              rootCauses:
                type: array
                items:
                  type: object
                  properties:
                    cause: { type: string }
                    probability: { enum: [high, medium, low] }
                    reasoning: { type: string }
                    verifyMethod: { type: string }
              mostLikely: { type: string }
          output: rootCauseResult

      - id: code-analysis
        label: 代码分析
        agent:
          prompt: |
            从代码角度分析：{{args.errorMessage}}
            列出可能出问题的文件位置，分析数据流断裂点。
          schema:
            type: object
            properties:
              suspiciousFiles:
                type: array
                items:
                  type: object
                  properties:
                    file: { type: string }
                    reason: { type: string }
                    checkItems: { type: array, items: { type: string } }
          output: codeResult

      - id: ops-analysis
        label: 运维分析
        agent:
          prompt: |
            从运行时角度分析：{{args.errorMessage}}
            提供排查步骤和快速修复方案。
          schema:
            type: object
            properties:
              steps:
                type: array
                items:
                  type: object
                  properties:
                    priority: { type: number }
                    action: { type: string }
                    expectedOutcome: { type: string }
              quickFix: { type: string }
          output: opsResult

  # ============================================================
  # 汇总综合
  # ============================================================
  - id: synthesis
    phase: 综合结论
    agent:
      prompt: >
        综合以下三个维度的分析结果，输出最终排查结论：
        根因分析：{{rootCauseResult.rootCauses}}
        代码分析：{{codeResult.suspiciousFiles}}
        运维建议：{{opsResult.steps}}
      output: finalReport
      schema:
        type: object
        properties:
          summary: { type: string }
          mostLikelyRootCause: { type: string }
          nextSteps: { type: array, items: { type: string } }

# yaml-language-server: $schema=./workflow-schema.json
name: marketplace-doctor
description: 诊断并修复插件版本不对齐——检查缓存版本 vs 代码版本，刷新 marketplace 并 checkout 正确 tag

phases:
  - title: 诊断
  - title: 修复

steps:

  # ============================================================
  # Phase 1 — 诊断状态
  # ============================================================
  - id: check-cached-version
    phase: 诊断
    label: 检查缓存版本
    agent:
      prompt: |
        读取 `$HOME/.claude/plugins/cache/cc-kit/cc-kit/` 下列出的版本目录，
        以及该目录下 plugin.json 中的 version 字段。
        同时读取本地 plugin/plugin.json 中的 version 字段。

        输出两者版本号："缓存: {x.y.z} / 本地: {x.y.z}"
      tools: [Bash, Read]

  - id: check-marketplace-clone
    phase: 诊断
    label: 检查 marketplace clone 状态
    agent:
      prompt: |
        执行以下命令检查 marketplace clone 当前状态：

        1. cd "$HOME/.claude/plugins/marketplaces/cc-kit" && git log --oneline -3
        2. cd "$HOME/.claude/plugins/marketplaces/cc-kit" && git tag -l 'cc-kit*'
        3. cd "$HOME/.claude/plugins/marketplaces/cc-kit" && git rev-parse HEAD

        输出：当前 HEAD commit、已有标签列表。
        并判断 HEAD 是否指向最新 tag（比较 commit hash）。
      tools: [Bash]

  # ============================================================
  # Phase 2 — 修复不对齐
  # ============================================================
  - id: marketplace-refresh
    phase: 修复
    label: 刷新 marketplace 缓存
    agent:
      prompt: |
        设置代理后执行 claude plugin marketplace update cc-kit。
        成功后再执行一次 clone 状态检查：

        cd "$HOME/.claude/plugins/marketplaces/cc-kit" && git log --oneline -3

        确认有新的 commit 被拉取。
      tools: [Bash]

  - id: checkout-correct-tag
    phase: 修复
    label: checkout 最新 tag
    agent:
      prompt: |
        进入 marketplace clone 目录并执行：

        cd "$HOME/.claude/plugins/marketplaces/cc-kit" && git fetch --tags origin

        然后找到最新 tag（按版本排序取最高）：
        LATEST_TAG=$(git tag -l 'cc-kit*' | sort -V | tail -1)

        然后 checkout：
        git checkout "$LATEST_TAG"

        确认 HEAD 已指向最新 tag 对应的 commit。
      tools: [Bash]

  - id: reinstall-plugin
    phase: 修复
    label: 重装插件
    agent:
      prompt: |
        清除插件缓存并重装：

        1. claude plugin uninstall cc-kit
        2. rm -rf "$HOME/.claude/plugins/cache/cc-kit"
        3. 设置代理后：claude plugin install cc-kit@cc-kit
        4. claude plugin details cc-kit

        确认显示的版本号与最近一次 tag 一致。
      tools: [Bash]

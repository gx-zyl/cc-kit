# yaml-language-server: $schema=./workflow-schema.json
name: verify-all
description: 循环运行类型检查/测试/构建，逐项修复直到全部通过
maxRounds: 3

phases:
  - title: 验证
  - title: 修复

steps:

  # ============================================================
  # 用 loop 实现"检查→修复→再检查"循环
  # ============================================================
  - id: verify-loop
    loop:
      maxRounds: 3                       # 最多 3 轮
      stopWhen: checks.allPassed         # 全部通过就提前结束
    steps:

      # --- 并行运行三项检查 ---
      - id: run-checks
        round: "{{loop.round}}"
        phase: 验证
        label: "第 {{loop.round}} 轮检查"
        parallel:
          - id: type-check
            label: 类型检查
            agent:
              prompt: "运行 tsc --noEmit，输出类型错误 JSON"
              schema:
                type: object
                properties:
                  passed: { type: boolean }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        file: { type: string }
                        line: { type: number }
                        message: { type: string }
              output: typeResult

          - id: unit-test
            label: 单元测试
            agent:
              prompt: "运行 jest run，输出测试结果 JSON"
              schema:
                type: object
                properties:
                  passed: { type: boolean }
                  failed: { type: number }
                  failures:
                    type: array
                    items:
                      type: object
                      properties:
                        test: { type: string }
                        file: { type: string }
                        message: { type: string }
              output: testResult

          - id: build-check
            label: 构建检查
            when: "{{loop.round}} == 1"   # 只在第一轮构建
            agent:
              prompt: "运行 npm run build，输出构建结果 JSON"
              schema:
                type: object
                properties:
                  passed: { type: boolean }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        message: { type: string }
              output: buildResult

      # --- 聚合检查结果 ---
      - id: aggregate
        phase: 验证
        label: 汇总结果
        set:
          allPassed: "{{typeResult.passed && testResult.passed && (!buildResult || buildResult.passed)}}"
          failures:
            combine:
              - from: typeResult.errors
                map: { type: "type", file, line, message }
              - from: testResult.failures
                map: { type: "test", file, message }
              - from: buildResult?.errors
                map: { type: "build", message }

      # --- 需要修复吗？ ---
      - id: fix
        when: "{{!allPassed && loop.round < maxRounds}}"
        phase: 修复
        label: 修复失败项
        parallel:
          - id: fix-type
            when: "{{typeResult.passed == false}}"
            agent:
              prompt: |
                修复以下类型错误：
                {{typeResult.errors}}
                修复后运行 tsc --noEmit 验证。
            label: 修复类型错误

          - id: fix-test
            when: "{{testResult.passed == false}}"
            agent:
              prompt: |
                修复以下测试失败：
                {{testResult.failures}}
                修复后运行对应测试验证。
            label: 修复测试失败

          - id: fix-build
            when: "{{buildResult?.passed == false}}"
            agent:
              prompt: |
                修复以下构建错误：
                {{buildResult.errors}}
            label: 修复构建错误
